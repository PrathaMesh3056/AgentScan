# .pre-commit-config.yaml
#
# Pre-commit hooks run automatically before every git commit.
# If any hook fails, the commit is blocked until you fix the issue.
#
# Install once with: pre-commit install
# Run manually:      pre-commit run --all-files

repos:
  # ── Ruff: lint + format (replaces flake8 + black + isort) ──────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        name: ruff lint
        args: [--fix]          # auto-fix safe issues
      - id: ruff-format
        name: ruff format      # auto-format (like black)

  # ── Mypy: static type checking ──────────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.9.0
    hooks:
      - id: mypy
        name: mypy type check
        additional_dependencies:
          - pydantic>=2.0
          - httpx>=0.27
        args: [--ignore-missing-imports]

  # ── General file hygiene ────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace   # remove trailing spaces
      - id: end-of-file-fixer     # ensure files end with newline
      - id: check-yaml            # validate YAML syntax
      - id: check-toml            # validate TOML syntax
      - id: check-merge-conflict  # block accidental merge conflict markers
      - id: debug-statements      # block accidental print() / breakpoint()
